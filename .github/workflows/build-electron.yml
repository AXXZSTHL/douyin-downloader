name: Build Electron

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_glob: 'desktop-electron/dist/*.exe desktop-electron/dist/*.blockmap'
          - os: macos-latest
            platform: mac
            artifact_glob: 'desktop-electron/dist/*.dmg desktop-electron/dist/*.zip desktop-electron/dist/*.blockmap'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron dependencies
        working-directory: desktop-electron
        run: npm ci

      - name: Build Electron (${{ matrix.platform }})
        working-directory: desktop-electron
        run: npx electron-builder --${{ matrix.platform }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
