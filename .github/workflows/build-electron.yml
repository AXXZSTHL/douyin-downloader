name: Build Electron

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            python_target: x86_64-pc-windows-msvc
            python_bin: python.exe
          - os: macos-latest
            platform: mac
            python_target: aarch64-apple-darwin
            python_bin: bin/python3

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron dependencies
        working-directory: desktop-electron
        run: npm ci

      - name: Download portable Python
        run: |
          PYTHON_TAG=20260610
          PYTHON_VER=3.12.13
          TRIPLE=${{ matrix.python_target }}
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PYTHON_TAG}/cpython-${PYTHON_VER}+${PYTHON_TAG}-${TRIPLE}-install_only.tar.gz"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o python.tar.gz
          mkdir -p desktop-electron/python-portable
          tar xzf python.tar.gz -C desktop-electron/python-portable --strip-components=1
          rm python.tar.gz
        shell: bash

      - name: Install Python deps into portable
        run: |
          desktop-electron/python-portable/${{ matrix.python_bin }} -m pip install --no-compile -r requirements.txt
        shell: bash

      - name: Build Electron (${{ matrix.platform }})
        working-directory: desktop-electron
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: desktop-electron/dist/*
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
